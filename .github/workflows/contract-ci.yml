name: Contract CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  contract:
    name: contract
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all --check --manifest-path Cargo.toml
        working-directory: contract

      - name: Run clippy
        run: cargo clippy --all-targets --all-features --manifest-path Cargo.toml -- -D warnings
        working-directory: contract

      - name: Run tests
        run: cargo test --all-features --manifest-path Cargo.toml
        working-directory: contract

      - name: Build wasm target
        run: cargo build --release --target wasm32-unknown-unknown --manifest-path Cargo.toml
        working-directory: contract

      - name: Verify wasm artifacts
        run: |
          WASM_DIR="target/wasm32-unknown-unknown/release"
          EXPECTED=(
            subscription
            myfans_token
            content_access
            creator_registry
            earnings
            treasury
          )
          MISSING=0
          for pkg in "${EXPECTED[@]}"; do
            WASM_FILE="${WASM_DIR}/${pkg}.wasm"
            if [[ -f "$WASM_FILE" && -s "$WASM_FILE" ]]; then
              echo "✅ ${pkg}.wasm ($(du -sh "$WASM_FILE" | cut -f1))"
            else
              echo "❌ ${pkg}.wasm: missing or empty"
              MISSING=1
            fi
          done
          if [[ "$MISSING" -eq 1 ]]; then
            echo "::error::One or more expected wasm artifacts are missing or empty after build."
            exit 1
          fi
        working-directory: contract
